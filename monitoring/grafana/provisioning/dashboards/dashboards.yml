apiVersion: 1

providers:
  - name: "predictive-maintenance"
    orgId: 1
    folder: "Predictive Maintenance"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
